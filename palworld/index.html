<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="A Palworld reference site for passive skills, Pals, items, and more."
    >
    <title>Palworld Reference | Passive Skills</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    >
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <nav
        class="palworld-nav navbar navbar-expand"
        aria-label="Palworld navigation"
      >
        <div class="nav-accent" aria-hidden="true"></div>
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="./">
              Passive Skills
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="site-content">
      <section
        id="data-status"
        class="data-status alert"
        role="status"
        aria-live="polite"
        hidden
      >
        <div>
          <strong id="data-status-title">Checking game data…</strong>
          <p id="data-status-message" class="mb-0"></p>
        </div>
        <div id="data-status-meta" class="data-status-meta"></div>
      </section>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
