<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yankees Moves & IL</title>
    <link rel="preconnect" href="https://statsapi.mlb.com" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="../shared.css" />
  </head>
  <body>
    <main class="site-shell container-fluid">
      <section class="moves-panel position-relative overflow-hidden" aria-labelledby="page-title">
        <header class="topbar d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-3">
          <div class="brand-lockup d-flex align-items-center gap-3">
            <img class="brand-logo" src="../assets/new-york-yankees.svg" alt="New York Yankees logo" />
            <div>
              <p class="kicker mb-1">New York Yankees</p>
              <h1 id="page-title" class="display-title mb-0">Moves & IL</h1>
            </div>
          </div>
          <div class="header-actions d-flex flex-column flex-sm-row gap-2">
            <span class="status-pill" id="data-status">Connecting to MLB data</span>
          </div>
        </header>

        <details class="site-nav">
          <summary><span>Menu</span><span class="site-nav-icon" aria-hidden="true"></span></summary>
          <nav class="site-nav-links" aria-label="Yankees sections">
            <a class="site-nav-link" href="../">Home</a>
            <a class="site-nav-link" href="../player-spotlight/">Player Spotlight</a>
            <a class="site-nav-link" href="../schedule/">Schedule</a>
            <a class="site-nav-link active" href="../moves-il/">Roster</a>
            <a class="site-nav-link" href="../team-overview/">Team Overview</a>
          </nav>
        </details>
        <nav class="desktop-site-nav navbar navbar-expand" aria-label="Yankees sections">
          <div class="navbar-nav">
            <a class="nav-link" href="../">Home</a>
            <a class="nav-link" href="../player-spotlight/">Player Spotlight</a>
            <a class="nav-link" href="../schedule/">Schedule</a>
            <a class="nav-link active" href="../moves-il/" aria-current="page">Roster</a>
            <a class="nav-link" href="../team-overview/">Team Overview</a>
          </div>
        </nav>

        <section class="moves-body">
          <section class="row g-3">
            <section class="col-12 col-xl-6">
              <div class="panel h-100">
                <div class="panel-head d-flex align-items-center justify-content-between gap-3">
                  <div>
                    <h2 class="panel-heading mb-0">Roster</h2>
                  </div>
                  <span id="roster-count">Loading</span>
                </div>
                <div class="roster-tabs mt-3" role="tablist" aria-label="Roster groups">
                  <button class="roster-tab active" id="batters-tab" type="button" role="tab" aria-selected="true" aria-controls="batters-panel" data-roster-tab="batters">Batters <span id="batters-count">--</span></button>
                  <button class="roster-tab" id="pitchers-tab" type="button" role="tab" aria-selected="false" aria-controls="pitchers-panel" data-roster-tab="pitchers">Pitchers <span id="pitchers-count">--</span></button>
                </div>
                <div class="roster-groups mt-3" id="roster-list">
                  <section class="roster-group active" id="batters-panel" role="tabpanel" aria-labelledby="batters-tab">
                    <div class="roster-list" id="batters-list"></div>
                  </section>
                  <section class="roster-group" id="pitchers-panel" role="tabpanel" aria-labelledby="pitchers-tab" hidden>
                    <div class="roster-list" id="pitchers-list"></div>
                  </section>
                </div>
              </div>
            </section>

            <section class="col-12 col-xl-6">
              <div class="panel h-100">
                <div class="panel-head d-flex align-items-center justify-content-between gap-3">
                  <div>
                    <h2 class="panel-heading mb-0">Transactions & IL</h2>
                  </div>
                  <span id="transaction-window">Last 45 days</span>
                </div>
                <div class="feed d-grid gap-2 mt-3" id="transaction-feed"></div>
                <nav class="transaction-pagination mt-3" id="transaction-pagination" aria-label="Transactions pages"></nav>
              </div>
            </section>
          </section>
        </section>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
