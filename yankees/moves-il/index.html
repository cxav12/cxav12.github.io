<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yankees Moves & IL</title>
    <link rel="preconnect" href="https://statsapi.mlb.com" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="site-shell container-fluid">
      <section class="moves-panel position-relative overflow-hidden" aria-labelledby="page-title">
        <header class="topbar d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-3">
          <div class="brand-lockup d-flex align-items-center gap-3">
            <img class="brand-logo" src="../assets/new-york-yankees.svg" alt="New York Yankees logo" />
            <div>
              <p class="kicker mb-1">New York Yankees</p>
              <h1 id="page-title" class="display-title mb-0">Moves & IL</h1>
            </div>
          </div>
          <div class="header-actions d-flex flex-column flex-sm-row gap-2">
            <span class="status-pill" id="data-status">Connecting to MLB data</span>
          </div>
        </header>

        <details class="site-nav">
          <summary><span>Menu</span><span class="site-nav-icon" aria-hidden="true"></span></summary>
          <nav class="site-nav-links" aria-label="Yankees sections">
            <a class="site-nav-link" href="../">Home</a>
            <a class="site-nav-link" href="../player-spotlight/">Player Spotlight</a>
            <a class="site-nav-link" href="../schedule/">Schedule</a>
            <a class="site-nav-link active" href="../moves-il/">Moves & IL</a>
            <a class="site-nav-link" href="../team-overview/">Team Overview</a>
          </nav>
        </details>

        <section class="moves-body">
          <div class="row g-50 align-items-end mb-4">
            <div class="col-12">
              <div class="summary-strip d-grid gap-2">
                <div>
                  <span>Active</span>
                  <strong id="active-count">--</strong>
                </div>
                <div>
                  <span>IL Notes</span>
                  <strong id="il-count">--</strong>
                </div>
                <div>
                  <span>Window</span>
                  <strong>45 days</strong>
                </div>
              </div>
            </div>
          </div>

          <section class="row g-3">
            <section class="col-12 col-xl-6">
              <div class="panel h-100">
                <div class="panel-head d-flex align-items-center justify-content-between gap-3">
                  <div>
                    <p class="panel-kicker mb-1">Club</p>
                    <h2 class="panel-heading mb-0">Yankees Roster</h2>
                  </div>
                  <span id="roster-count">Loading</span>
                </div>
                <div class="row g-2 roster-list mt-3" id="roster-list"></div>
              </div>
            </section>

            <section class="col-12 col-xl-6">
              <div class="panel h-100">
                <div class="panel-head d-flex align-items-center justify-content-between gap-3">
                  <div>
                    <p class="panel-kicker mb-1">Movement</p>
                    <h2 class="panel-heading mb-0">Transactions & IL</h2>
                  </div>
                  <span id="transaction-window">Last 45 days</span>
                </div>
                <div class="feed d-grid gap-2 mt-3" id="transaction-feed"></div>
              </div>
            </section>
          </section>
        </section>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
