<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yankees Schedule</title>
    <link rel="preconnect" href="https://statsapi.mlb.com" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="../shared.css" />
  </head>
  <body>
    <main class="site-shell container-fluid">
      <section class="schedule-panel position-relative overflow-hidden">
        <header class="topbar d-flex flex-column flex-lg-row align-items-start align-items-lg-center justify-content-between gap-3">
          <div class="brand-lockup d-flex align-items-center gap-3">
            <img class="brand-logo" src="../assets/new-york-yankees.svg" alt="New York Yankees logo" />
            <div>
              <p class="kicker brand-kicker mb-1">New York</p>
              <h1 class="display-title brand-title mb-0">Yankees</h1>
            </div>
          </div>
          <div class="header-actions d-flex flex-column flex-sm-row gap-2">
            <span class="status-pill" id="data-status">Connecting to MLB data</span>
          </div>
        </header>

        <details class="site-nav">
          <summary><span>Menu</span><span class="site-nav-icon" aria-hidden="true"></span></summary>
          <nav class="site-nav-links" aria-label="Yankees sections">
            <a class="site-nav-link" href="../">Home</a>
            <a class="site-nav-link" href="../player-spotlight/">Player Spotlight</a>
            <a class="site-nav-link active" href="../schedule/">Schedule</a>
            <a class="site-nav-link" href="../moves-il/">Roster</a>
            <a class="site-nav-link" href="../team-overview/">Team Overview</a>
          </nav>
        </details>
        <nav class="desktop-site-nav navbar navbar-expand" aria-label="Yankees sections">
          <div class="navbar-nav">
            <a class="nav-link" href="../">Home</a>
            <a class="nav-link" href="../player-spotlight/">Player Spotlight</a>
            <a class="nav-link active" href="../schedule/" aria-current="page">Schedule</a>
            <a class="nav-link" href="../moves-il/">Roster</a>
            <a class="nav-link" href="../team-overview/">Team Overview</a>
          </div>
        </nav>

        <section class="schedule-body">
          <h2 class="page-heading site-page-title" id="page-title">Schedule</h2>
          <div class="schedule-toolbar">
            <div class="month-info">
              <h3 class="month-title mb-0" id="month-title">Loading month</h3>
              <p class="month-summary mb-0" id="month-summary">Final scores, live games, and upcoming details appear inside each date.</p>
            </div>
            <div class="month-controls d-flex flex-column flex-sm-row gap-2">
              <button class="btn btn-control" id="prev-month" type="button">Previous Month</button>
              <button class="btn btn-control" id="current-month" type="button">Current Month</button>
              <button class="btn btn-control" id="next-month" type="button">Next Month</button>
            </div>
          </div>

          <div class="calendar-shell">
            <div class="weekday-row" aria-hidden="true">
              <span>Sun</span>
              <span>Mon</span>
              <span>Tue</span>
              <span>Wed</span>
              <span>Thu</span>
              <span>Fri</span>
              <span>Sat</span>
            </div>
            <section class="calendar-grid" id="calendar-grid" aria-label="Yankees monthly schedule"></section>
          </div>
        </section>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
