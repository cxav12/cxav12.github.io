<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yankees</title>
    <link rel="preconnect" href="https://statsapi.mlb.com" />
    <link rel="preconnect" href="https://img.mlbstatic.com" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container-fluid app-shell">
      <section class="spotlight overflow-hidden position-relative" aria-labelledby="page-title">
        <header class="topbar d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-3">
          <div class="brand-lockup d-flex align-items-center gap-3 min-w-0">
            <img class="brand-logo" src="../assets/new-york-yankees.svg" alt="New York Yankees logo" />
            <div class="min-w-0">
              <p class="kicker mb-1">New York Yankees</p>
              <h1 id="page-title" class="display-title mb-0">Player Spotlight</h1>
            </div>
          </div>
          <div class="header-actions d-flex flex-column flex-sm-row gap-2">
            <a class="btn btn-outline-light nav-home-link" href="../">Yankees Home</a>
            <div class="badge status-pill" id="data-status">Connecting to MLB data</div>
          </div>
        </header>

        <section class="row g-4 g-xl-5 spotlight-body">
          <aside class="col-12 col-lg-4 col-xl-3" aria-label="Selected player">
            <div class="portrait-wrap">
              <img id="player-headshot" class="img-fluid" alt="" />
            </div>
            <div class="player-bio d-grid gap-3 mt-3" id="player-bio"></div>
          </aside>

          <section class="col-12 col-lg-8 col-xl-9 d-grid gap-3 player-main">
            <div class="row g-2 align-items-end">
              <label class="col-12 col-md" for="player-search">
                <span class="form-label label-small">Search any player</span>
                <input id="player-search" class="form-control form-control-lg" type="search" placeholder="Aaron Judge, Gerrit Cole..." autocomplete="off" />
              </label>
              <div class="col-12 col-md-auto">
                <button id="search-button" class="btn btn-yankees btn-lg w-100" type="button">Search</button>
              </div>
            </div>
            <div class="row g-2 search-results" id="search-results" hidden></div>

            <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between gap-3">
              <div class="min-w-0">
                <p id="player-meta" class="player-meta mb-2">Loading player</p>
                <h2 id="player-name" class="player-name mb-0">Yankees</h2>
              </div>
              <a id="savant-link" class="btn btn-outline-light btn-lg flex-shrink-0" href="https://baseballsavant.mlb.com/" target="_blank" rel="noreferrer">Baseball Savant</a>
            </div>

            <section aria-label="Season stats">
              <p class="section-label mb-2" id="season-label">Season</p>
              <div class="row g-0 stat-grid primary" id="primary-stats"></div>
              <div class="row g-0 stat-grid compact mt-2" id="secondary-stats"></div>
            </section>

            <section aria-label="Recent games">
              <div class="d-flex flex-column flex-sm-row align-items-start align-items-sm-center justify-content-between gap-2">
                <p class="section-label mb-0">Recent Games</p>
                <span id="recent-summary"></span>
              </div>
              <div class="table-responsive table-shell mt-2">
                <table class="table table-dark table-hover align-middle mb-0">
                  <thead id="game-log-head"></thead>
                  <tbody id="game-log-body"></tbody>
                </table>
              </div>
            </section>
          </section>
        </section>
      </section>
    </main>

    <template id="stat-template">
      <article class="col stat-card">
        <strong></strong>
        <span></span>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
