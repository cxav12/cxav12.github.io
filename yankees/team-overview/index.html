<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yankees Team Overview</title>
    <link rel="preconnect" href="https://statsapi.mlb.com" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="../shared.css" />
  </head>
  <body>
    <main class="site-shell container-fluid">
      <section class="overview-panel position-relative overflow-hidden">
        <header class="topbar d-flex flex-column flex-lg-row align-items-start align-items-lg-center justify-content-between gap-3">
          <div class="brand-lockup d-flex align-items-center gap-3">
            <img class="brand-logo" src="../assets/new-york-yankees.svg" alt="New York Yankees logo" />
            <div>
              <p class="kicker brand-kicker mb-1">New York</p>
              <h1 class="display-title brand-title mb-0">Yankees</h1>
            </div>
          </div>
          <div class="header-actions d-flex flex-column flex-sm-row gap-2">
            <span class="status-pill" id="data-status">Connecting to MLB data</span>
          </div>
        </header>

        <details class="site-nav">
          <summary><span>Menu</span><span class="site-nav-icon" aria-hidden="true"></span></summary>
          <nav class="site-nav-links" aria-label="Yankees sections">
            <a class="site-nav-link" href="../">Home</a>
            <a class="site-nav-link" href="../player-spotlight/">Player Spotlight</a>
            <a class="site-nav-link" href="../schedule/">Schedule</a>
            <a class="site-nav-link" href="../moves-il/">Roster</a>
            <a class="site-nav-link active" href="../team-overview/">Team Overview</a>
          </nav>
        </details>
        <nav class="desktop-site-nav navbar navbar-expand" aria-label="Yankees sections">
          <div class="navbar-nav">
            <a class="nav-link" href="../">Home</a>
            <a class="nav-link" href="../player-spotlight/">Player Spotlight</a>
            <a class="nav-link" href="../schedule/">Schedule</a>
            <a class="nav-link" href="../moves-il/">Roster</a>
            <a class="nav-link active" href="../team-overview/" aria-current="page">Team Overview</a>
          </div>
        </nav>

        <section class="overview-body">
          <h2 class="page-heading site-page-title" id="view-title">Team Overview</h2>

          <section id="overview-panel" aria-label="Yankees team overview">
            <div class="row g-3">
              <div class="col-12 col-xl-5">
                <article class="team-card h-100" id="yankees-card"></article>
              </div>
              <div class="col-12 col-xl-7">
                <section class="insight-panel standings-panel h-100" aria-labelledby="standings-title">
                  <div class="standings-head d-flex flex-column flex-sm-row align-items-start align-items-sm-center justify-content-between gap-2 mb-3">
                    <h3 id="standings-title" class="mb-0">Standings</h3>
                    <span class="standings-context" id="standings-context">AL East</span>
                  </div>
                  <div class="standings-controls mb-2" id="standings-mode-controls" role="group" aria-label="Standings view">
                    <button class="standings-option active" type="button" data-standings-mode="division">Division</button>
                    <button class="standings-option" type="button" data-standings-mode="league">League</button>
                    <button class="standings-option" type="button" data-standings-mode="mlb">MLB</button>
                  </div>
                  <div class="standings-controls standings-filter-controls mb-3" id="standings-filter-controls" role="group" aria-label="Standings filter"></div>
                  <div class="standings-table-shell">
                    <table class="standings-table">
                      <thead>
                        <tr>
                          <th scope="col">Rank</th>
                          <th scope="col">Team</th>
                          <th scope="col">W</th>
                          <th scope="col">L</th>
                          <th scope="col">PCT</th>
                          <th scope="col">GB</th>
                        </tr>
                      </thead>
                      <tbody id="standings-body">
                        <tr>
                          <td colspan="6">Loading standings</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </section>
              </div>
            </div>
          </section>
        </section>
      </section>
    </main>

    <template id="metric-template">
      <article class="metric-row">
        <div>
          <span class="metric-badge"></span>
          <strong></strong>
        </div>
        <div class="metric-value">
          <span></span>
          <small></small>
        </div>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
